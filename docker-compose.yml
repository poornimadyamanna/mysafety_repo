version: "3.9"

services:
  mysafety-backend:
    build:
      context: .
    image: mysafety-backend
    container_name: mysafety-backend
    expose:
      - "4000"
    env_file:
      - .env
    volumes:
      - backend-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/app/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysafety-admin:
    build:
      context: ../Admin
    image: mysafety-admin
    container_name: mysafety-admin
    expose:
      - "3000"
    env_file:
      - ../Admin/.env
    environment:
      - HOSTNAME=0.0.0.0
    depends_on:
      - mysafety-backend

  nginx:
    build:
      context: ./nginx
    image: mysafety-nginx
    container_name: mysafety-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - mysafety-backend
      - mysafety-admin

  redis:
    image: redis:7-alpine
    container_name: mysafety-redis
    ports:
      - "6379:6379"
    command: [
      "redis-server",
      "--appendonly", "yes",
      "--maxmemory", "256mb",
      "--maxmemory-policy", "allkeys-lru",
      "--save", "60", "1000",
      "--tcp-keepalive", "60",
      "--timeout", "0"
    ]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-data:
  backend-logs:
