events {
    worker_connections 1024;
}

http {

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name mysafety24x7.in www.mysafety24x7.in;

        return 301 https://$host$request_uri;
    }

    # HTTPS Main Server
    server {
        listen 443 ssl http2;
        server_name mysafety24x7.in www.mysafety24x7.in;

        ssl_certificate /etc/letsencrypt/live/mysafety24x7.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mysafety24x7.in/privkey.pem;

        # SOCKET SUPPORT
        location /socket.io/ {
            proxy_pass http://mysafety-backend:4000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # BACKEND API
        location /api/ {
            proxy_pass http://mysafety-backend:4000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # ADMIN FRONTEND
        location / {
            proxy_pass http://mysafety-admin:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
